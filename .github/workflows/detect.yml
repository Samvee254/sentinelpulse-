name: SentinelPulse Detection

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run feed ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m app.ingest.fetch_feeds

      - name: Run correlation
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m app.ingest.correlate
